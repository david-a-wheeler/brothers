<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Brothers</title>
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="stylesheet" href="css/style.css" />

    <!--
      Phaser is loaded from a CDN as a classic script, so it lives on the
      global `window.Phaser`. Our own code (below) is loaded as native ES
      modules, which can read that global. No build step, no bundler.
    -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  </head>
  <body>
    <div id="game"></div>

    <!-- Module scripts are deferred, so Phaser is already defined here. -->
    <script type="module" src="src/main.js"></script>
  </body>
</html>
